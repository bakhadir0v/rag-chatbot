services:
  rag-api:
    build: .
    container_name: rag-chatbot
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - faiss_data:/app/data/faiss_index
      - ./data/documents:/app/data/documents:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  faiss_data:
